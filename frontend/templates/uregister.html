{% extends "adminlayout.html" %}
{% block content %}
<div class="container">

    <div class="card o-hidden border-0 shadow-lg my-5">
        <div class="card-body p-0">
            <!-- Nested Row within Card Body -->
            <div class="row">
                <div class="col-lg-5 d-none d-lg-block mt-5 mb-3">
                    <div class="text-center">
                        <h1 class="h4 text-gray-900">Real Time Video</h1>
                    </div>
                    <div class="ml-2 mt-3">
                    <img src="{{ url_for('video_stream') }}" class="rounded" alt="Alps" style="width: 100%">
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="p-5">
                        <div class="text-center">
                            <h1 class="h4 text-gray-900 mb-4">Create an Account!</h1>
                        </div>
                        <form class="user" action="" method="post" enctype="multipart/form-data">
                            <div class="form-group row">
                                <div class="col-sm-6 mb-3 mb-sm-0">
                                    <input type="text" class="form-control form-control-user" id="exampleFirstName"
                                        placeholder="First Name"
                                        name="name" value="{{ name }}" required>
                                </div>
                                <div class="col-sm-6">
                                    <input type="text" class="form-control form-control-user" id="exampleLastName"
                                        placeholder="Last Name"
                                        name="lname" value="{{ lname }}" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <input type="email" class="form-control form-control-user" id="exampleInputEmail"
                                    placeholder="Admin Email Address"
                                    name="email" value="{{ email }}" required>
                            </div>
                            <div class="form-group row">
                                <div class="col-sm-6 mb-3 mb-sm-0">
                                    <input type="password" class="form-control form-control-user"
                                        id="exampleInputPassword" placeholder="Admin Password"
                                        name="password" value="{{ password }}" required>
                                </div>
                                <div class="col-sm-6">
                                    <input type="password" class="form-control form-control-user"
                                        id="exampleRepeatPassword" placeholder="User Password"
                                        name="upassword" value="{{ upassword }}" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <input type="text" class="form-control form-control-user" id="exampleInputEmail"
                                    placeholder="Enter the Account No"
                                    name="lockerid" value="{{ lockerid }}" required>
                            </div>
                            <button name="sub" value="Submit" class="btn btn-primary btn-user btn-block">
                                Register Account
                            </button>
                            <hr>
                            <!--a href="index.html" class="btn btn-google btn-user btn-block">
                                <i class="fab fa-google fa-fw"></i> Register with Google
                            </a>
                            <a href="index.html" class="btn btn-facebook btn-user btn-block">
                                <i class="fab fa-facebook-f fa-fw"></i> Register with Facebook
                            </a-->
                            <div class="text-center text-danger">
                            {{ error }}
                            </div>
                        </form>
                        <hr>

                    </div>
                </div>
            </div>
        </div>
    </div>

{% endblock %}
